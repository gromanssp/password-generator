@if (toogleService.isOpen()) {
  <div class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-900 rounded-xl shadow-xl w-full max-w-sm p-6">

      <!-- Header -->
      <div class="flex items-start gap-3 mb-5">
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-green-100 dark:bg-green-900/30 shrink-0">
          <!-- Paloma success -->
          <svg class="w-5 h-5 text-green-600 dark:text-green-400" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5" />
          </svg>
        </div>
        <div>
          <h3 class="text-base font-semibold text-gray-900 dark:text-white">Password generated</h3>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Your new password is ready to use.</p>
        </div>
      </div>

      <!-- Password display -->
      <div class="bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 
                  rounded-lg px-4 py-3 mb-5 text-center">
        <input
          readonly
          id="pass-generated"
          type="text"
          [value]="toogleService.password()"
          name="pass-generated"
          aria-label="pass-generated"
          class="w-full bg-transparent text-center font-mono text-base text-gray-800 
                 dark:text-gray-100 tracking-wide select-all focus:outline-none" />
      </div>

      <!-- Actions -->
      <div class="flex justify-end">
        <button
          type="button"
          (click)="close()"
          class="px-5 py-2 text-sm font-medium rounded-lg border border-gray-200 
                 dark:border-gray-700 text-gray-700 dark:text-gray-200
                 hover:bg-gray-100 dark:hover:bg-gray-800
                 cursor-pointer transition-colors">
          OK
        </button>
      </div>

    </div>
  </div>
}
