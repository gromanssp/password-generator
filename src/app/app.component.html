<div class="bg-gray-700">
  <app-modal title="Password generated" size="sm">
    <div class="form-group modal-content-body items-center">
      <div class="flex items-center justify-center w-10 h-10 rounded-full bg-green-100 dark:bg-green-900/30 shrink-0">
        <!-- Success checkmark -->
        <svg class="w-5 h-5 text-green-600 dark:text-green-400" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5" />
        </svg>
      </div>
      <label class="form-label">Your new password is ready.</label>
      <div class="password-field">
        <input readonly [value]="toogleService.password()" type="text" class="form-control" placeholder="Password generated">
        <button class="copy-btn" [class.copied]="copied()" (click)="copyPassword()" title="Copy password">
          @if (copied()) {
            <!-- Copied: checkmark -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6L9 17l-5-5" />
            </svg>
          } @else {
            <!-- Copy icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          }
        </button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline-secondary" (click)="toogleService.close()">OK</button>
    </div>
  </app-modal>
  <app-cards-section></app-cards-section>
</div>
